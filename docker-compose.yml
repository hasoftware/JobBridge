services:
  postgres:
    image: postgres:16-alpine
    container_name: jobbridge-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobbridge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5440:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobbridge"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
